<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PhishGuard</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;600;700;800&display=swap');

    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --border: #1e1e2e;
      --text: #e2e2f0;
      --muted: #6b6b8a;
      --safe: #22c55e;
      --warn: #f59e0b;
      --danger: #ef4444;
      --accent: #818cf8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 340px;
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 18px 12px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, var(--accent), #6366f1);
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }

    .brand {
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 0.03em;
      color: var(--text);
    }

    .brand span {
      color: var(--accent);
    }

    /* ── Risk Display ── */
    .risk-card {
      margin: 14px 16px;
      border-radius: 12px;
      border: 1px solid var(--border);
      overflow: hidden;
      background: var(--surface);
    }

    .risk-header {
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .risk-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .risk-icon.safe    { background: rgba(34, 197, 94, 0.15); }
    .risk-icon.medium  { background: rgba(245, 158, 11, 0.15); }
    .risk-icon.high    { background: rgba(239, 68, 68, 0.15); }
    .risk-icon.unknown { background: rgba(107, 107, 138, 0.15); }

    .risk-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 2px;
    }

    .risk-value {
      font-size: 18px;
      font-weight: 800;
    }

    .risk-value.safe    { color: var(--safe); }
    .risk-value.medium  { color: var(--warn); }
    .risk-value.high    { color: var(--danger); }
    .risk-value.unknown { color: var(--muted); }

    /* ── Score Bar ── */
    .score-bar-wrap {
      padding: 0 16px 14px;
    }

    .score-bar-track {
      height: 5px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }

    .score-bar-fill {
      height: 100%;
      border-radius: 99px;
      transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .score-bar-fill.safe    { background: var(--safe); }
    .score-bar-fill.medium  { background: var(--warn); }
    .score-bar-fill.high    { background: var(--danger); }

    .score-meta {
      display: flex;
      justify-content: space-between;
      margin-top: 6px;
      font-size: 10px;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
    }

    /* ── URL Display ── */
    .url-strip {
      margin: 0 16px 12px;
      padding: 8px 12px;
      background: var(--border);
      border-radius: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Findings ── */
    .findings-section {
      margin: 0 16px 14px;
    }

    .section-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .findings-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-height: 120px;
      overflow-y: auto;
    }

    .findings-list::-webkit-scrollbar { width: 3px; }
    .findings-list::-webkit-scrollbar-track { background: transparent; }
    .findings-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

    .finding-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 8px;
      border-radius: 6px;
      background: var(--border);
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
    }

    .finding-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .finding-dot.url  { background: var(--accent); }
    .finding-dot.page { background: var(--warn); }
    .finding-dot.safe { background: var(--safe); }

    .finding-text {
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 24px 16px;
      color: var(--muted);
      font-size: 12px;
    }

    /* ── Footer ── */
    .footer {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      border-top: 1px solid var(--border);
    }

    .btn {
      flex: 1;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }

    .btn:hover {
      background: var(--border);
      border-color: var(--accent);
    }

    .btn.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .btn.primary:hover {
      background: #6366f1;
    }

    /* ── Pending ── */
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .pending-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 1s ease-in-out infinite;
    }

    .loading-text {
      font-size: 12px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 0;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">🛡</div>
    <div class="brand">Phish<span>Guard</span></div>
  </div>

  <div id="main-content">
    <div class="empty-state">Analyzing page…</div>
  </div>

  <div class="footer">
    <button class="btn" id="btn-reanalyze">↺ Rescan</button>
    <button class="btn primary" id="btn-report">⚑ Report</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
